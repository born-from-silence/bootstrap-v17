<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Countdown | Glassmorphism Timer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.37);
            --accent-coral: #FF6B6B;
            --accent-purple: #A78BFA;
            --accent-cyan: #67E8F9;
            --text-primary: #f0f0f0;
            --text-secondary: #b0b0b0;
            --bg-gradient-1: #0f0c29;
            --bg-gradient-2: #302b63;
            --bg-gradient-3: #24243e;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, var(--bg-gradient-1), var(--bg-gradient-2), var(--bg-gradient-3));
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-x: hidden;
        }

        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        /* Background decorations */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            z-index: -1;
            animation: float 20s ease-in-out infinite;
        }

        .orb-1 {
            width: 300px;
            height: 300px;
            background: var(--accent-coral);
            top: 10%;
            left: 10%;
        }

        .orb-2 {
            width: 400px;
            height: 400px;
            background: var(--accent-purple);
            bottom: 10%;
            right: 10%;
            animation-delay: -5s;
        }

        .orb-3 {
            width: 250px;
            height: 250px;
            background: var(--accent-cyan);
            top: 50%;
            left: 50%;
            animation-delay: -10s;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(30px, -30px) scale(1.1); }
            50% { transform: translate(-20px, 20px) scale(0.95); }
            75% { transform: translate(20px, 10px) scale(1.05); }
        }

        /* Main container */
        .container {
            width: 100%;
            max-width: 600px;
            z-index: 1;
        }

        /* Glass card style */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: var(--glass-shadow);
            padding: 40px;
            margin-bottom: 20px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .glass-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 300;
            letter-spacing: 0.1em;
            margin-bottom: 10px;
            background: linear-gradient(135deg, var(--accent-coral), var(--accent-purple), var(--accent-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            background-size: 200% 200%;
            animation: shimmer 3s ease infinite;
        }

        @keyframes shimmer {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .header p {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        /* Timer display */
        .timer-display {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 40px 0;
            flex-wrap: wrap;
        }

        .time-unit {
            text-align: center;
            min-width: 80px;
        }

        .time-value {
            font-size: 3.5rem;
            font-weight: 200;
            font-variant-numeric: tabular-nums;
            color: var(--text-primary);
            text-shadow: 0 0 30px rgba(103, 232, 249, 0.3);
            line-height: 1;
        }

        .time-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: var(--text-secondary);
            margin-top: 8px;
        }

        .time-separator {
            font-size: 2.5rem;
            font-weight: 200;
            color: var(--text-secondary);
            align-self: flex-start;
            margin-top: 10px;
        }

        /* Input section */
        .input-section {
            margin-bottom: 25px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 20px;
        }

        .input-group label {
            font-size: 0.85rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .input-group input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 14px 18px;
            color: var(--text-primary);
            font-size: 1rem;
            font-family: inherit;
            transition: all 0.3s ease;
            outline: none;
        }

        .input-group input:focus {
            border-color: var(--accent-purple);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 20px rgba(167, 139, 250, 0.2);
        }

        .input-group input[type="datetime-local"]::-webkit-calendar-picker-indicator {
            filter: invert(1);
            cursor: pointer;
        }

        /* Duration inputs */
        .duration-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        .duration-input {
            text-align: center;
        }

        .duration-input input {
            width: 100%;
            text-align: center;
            font-variant-numeric: tabular-nums;
        }

        .duration-input label {
            display: block;
            text-align: center;
            margin-top: 6px;
            font-size: 0.7rem;
        }

        /* Buttons */
        .button-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 14px 28px;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            backdrop-filter: blur(10px);
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-cyan));
            border: none;
            color: #1a1a2e;
            font-weight: 500;
        }

        .btn-primary:hover {
            box-shadow: 0 4px 25px rgba(167, 139, 250, 0.4);
        }

        .btn-danger {
            background: linear-gradient(135deg, var(--accent-coral), #ff8e8e);
            border: none;
            color: white;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* Progress ring */
        .progress-container {
            position: relative;
            width: 200px;
            height: 200px;
            margin: 0 auto 30px;
        }

        .progress-ring {
            transform: rotate(-90deg);
        }

        .progress-ring-bg {
            fill: none;
            stroke: rgba(255, 255, 255, 0.1);
            stroke-width: 8;
        }

        .progress-ring-fill {
            fill: none;
            stroke: url(#gradient);
            stroke-width: 8;
            stroke-linecap: round;
            transition: stroke-dashoffset 0.5s ease;
        }

        /* Audio status */
        .audio-status {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 12px 20px;
            background: rgba(103, 232, 249, 0.1);
            border: 1px solid rgba(103, 232, 249, 0.3);
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            color: var(--accent-cyan);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .audio-status:hover {
            background: rgba(103, 232, 249, 0.15);
        }

        .audio-status.enabled {
            background: rgba(167, 139, 250, 0.15);
            border-color: var(--accent-purple);
            color: var(--accent-purple);
        }

        .audio-status svg {
            width: 20px;
            height: 20px;
        }

        /* Alarm overlay */
        .alarm-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(20px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.5s ease;
        }

        .alarm-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .alarm-content {
            text-align: center;
            animation: alarmPulse 1s ease infinite;
        }

        @keyframes alarmPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .alarm-icon {
            font-size: 6rem;
            margin-bottom: 20px;
        }

        .alarm-text {
            font-size: 3rem;
            font-weight: 300;
            background: linear-gradient(135deg, var(--accent-coral), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 30px;
        }

        /* Preset buttons */
        .presets {
            display: flex;
            gap: 8px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .preset-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 8px 16px;
            color: var(--text-secondary);
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .preset-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
            border-color: var(--accent-purple);
        }

        /* Notification toast */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 16px 24px;
            color: var(--text-primary);
            font-size: 0.95rem;
            z-index: 1001;
            opacity: 0;
            transition: all 0.4s ease;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .toast-icon {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .toast-icon.success {
            background: rgba(103, 232, 249, 0.2);
            color: var(--accent-cyan);
        }

        .toast-icon.error {
            background: rgba(255, 107, 107, 0.2);
            color: var(--accent-coral);
        }

        /* Responsive */
        @media (max-width: 480px) {
            .time-value {
                font-size: 2.5rem;
            }
            .time-separator {
                font-size: 2rem;
            }
            .duration-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .glass-card {
                padding: 25px;
            }
            .header h1 {
                font-size: 2rem;
            }
        }

        /* Status indicator */
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #555;
            transition: all 0.3s ease;
        }

        .status-dot.running {
            background: var(--accent-cyan);
            box-shadow: 0 0 10px var(--accent-cyan);
            animation: pulse 1.5s ease infinite;
        }

        .status-dot.paused {
            background: #fbbf24;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>
</head>
<body>
    <!-- Background orbs -->
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <!-- Main container -->
    <div class="container">
        <!-- Header -->
        <div class="glass-card header">
            <h1>Nexus Countdown</h1>
            <p>Time your moments with elegance</p>
        </div>

        <!-- Timer Display -->
        <div class="glass-card">
            <!-- SVG Gradient -->
            <svg width="0" height="0">
                <defs>
                    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#FF6B6B"/>
                        <stop offset="50%" style="stop-color:#A78BFA"/>
                        <stop offset="100%" style="stop-color:#67E8F9"/>
                    </linearGradient>
                </defs>
            </svg>

            <div class="status-bar">
                <div class="status-indicator">
                    <span class="status-dot" id="statusDot"></span>
                    <span id="statusText">Ready</span>
                </div>
                <span id="endTime"></span>
            </div>

            <!-- Progress Ring -->
            <div class="progress-container">
                <svg class="progress-ring" width="200" height="200" viewBox="0 0 200 200">
                    <circle class="progress-ring-bg" cx="100" cy="100" r="90"/>
                    <circle class="progress-ring-fill" id="progressRing" cx="100" cy="100" r="90" 
                            stroke-dasharray="565.48" stroke-dashoffset="0"/>
                </svg>
            </div>

            <!-- Time Display -->
            <div class="timer-display">
                <div class="time-unit">
                    <div class="time-value" id="days">00</div>
                    <div class="time-label">Days</div>
                </div>
                <div class="time-separator">:</div>
                <div class="time-unit">
                    <div class="time-value" id="hours">00</div>
                    <div class="time-label">Hours</div>
                </div>
                <div class="time-separator">:</div>
                <div class="time-unit">
                    <div class="time-value" id="minutes">00</div>
                    <div class="time-label">Minutes</div>
                </div>
                <div class="time-separator">:</div>
                <div class="time-unit">
                    <div class="time-value" id="seconds">00</div>
                    <div class="time-label">Seconds</div>
                </div>
            </div>
        </div>

        <!-- Controls -->
        <div class="glass-card">
            <!-- Audio Status -->
            <div class="audio-status" id="audioStatus">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M11 5L6 9H2v6h4l5 4V5z"/>
                    <line x1="23" y1="9" x2="17" y2="15"/>
                    <line x1="17" y1="9" x2="23" y2="15"/>
                </svg>
                <span>Click to enable audio alarm</span>
            </div>

            <!-- Time Input -->
            <div class="input-section">
                <div class="input-group">
                    <label>Set Target Date/Time</label>
                    <input type="datetime-local" id="dateTimeInput"/>
                </div>

                <div class="presets">
                    <button class="preset-btn" data-min="1">1 min</button>
                    <button class="preset-btn" data-min="5">5 min</button>
                    <button class="preset-btn" data-min="10">10 min</button>
                    <button class="preset-btn" data-min="25">25 min</button>
                    <button class="preset-btn" data-min="60">1 hour</button>
                    <button class="preset-btn" data-min="90">1.5 hours</button>
                </div>

                <label style="display: block; margin-bottom: 10px; font-size: 0.85rem; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.1em;">Or Set Duration</label>
                <div class="duration-grid">
                    <div class="duration-input">
                        <input type="number" id="daysInput" min="0" max="999" value="0" placeholder="00"/>
                        <label>Days</label>
                    </div>
                    <div class="duration-input">
                        <input type="number" id="hoursInput" min="0" max="23" value="0" placeholder="00"/>
                        <label>Hours</label>
                    </div>
                    <div class="duration-input">
                        <input type="number" id="minutesInput" min="0" max="59" value="5" placeholder="00"/>
                        <label>Minutes</label>
                    </div>
                    <div class="duration-input">
                        <input type="number" id="secondsInput" min="0" max="59" value="0" placeholder="00"/>
                        <label>Seconds</label>
                    </div>
                </div>
            </div>

            <!-- Button Group -->
            <div class="button-group">
                <button class="btn btn-primary" id="startBtn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M8 5v14l11-7z"/>
                    </svg>
                    Start
                </button>
                <button class="btn" id="pauseBtn" disabled>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
                    </svg>
                    Pause
                </button>
                <button class="btn btn-danger" id="resetBtn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/>
                    </svg>
                    Reset
                </button>
            </div>
        </div>
    </div>

    <!-- Alarm Overlay -->
    <div class="alarm-overlay" id="alarmOverlay">
        <div class="alarm-content">
            <div class="alarm-icon">
                <span id="alarmEmoji">⏰</span>
            </div>
            <div class="alarm-text">TIME'S UP!</div>
            <button class="btn btn-primary" id="dismissAlarm">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M5 13l4 4L19 7"/>
                </svg>
                Dismiss
            </button>
        </div>
    </div>

    <!-- Toast Notification -->
    <div class="toast" id="toast">
        <span class="toast-icon" id="toastIcon"></span>
        <span id="toastMessage"></span>
    </div>

    <script>
        // Timer state
        let timerState = {
            targetTime: null,
            totalDuration: 0,
            remaining: 0,
            isRunning: false,
            isPaused: false,
            intervalId: null,
            audioEnabled: false,
            audioContext: null
        };

        // DOM elements
        const el = {
            days: document.getElementById('days'),
            hours: document.getElementById('hours'),
            minutes: document.getElementById('minutes'),
            seconds: document.getElementById('seconds'),
            dateTimeInput: document.getElementById('dateTimeInput'),
            daysInput: document.getElementById('daysInput'),
            hoursInput: document.getElementById('hoursInput'),
            minutesInput: document.getElementById('minutesInput'),
            secondsInput: document.getElementById('secondsInput'),
            startBtn: document.getElementById('startBtn'),
            pauseBtn: document.getElementById('pauseBtn'),
            resetBtn: document.getElementById('resetBtn'),
            audioStatus: document.getElementById('audioStatus'),
            statusDot: document.getElementById('statusDot'),
            statusText: document.getElementById('statusText'),
            endTime: document.getElementById('endTime'),
            progressRing: document.getElementById('progressRing'),
            alarmOverlay: document.getElementById('alarmOverlay'),
            dismissAlarm: document.getElementById('dismissAlarm'),
            toast: document.getElementById('toast'),
            toastIcon: document.getElementById('toastIcon'),
            toastMessage: document.getElementById('toastMessage')
        };

        // Circle circumference for progress ring
        const CIRCUMFERENCE = 2 * Math.PI * 90; // r = 90

        // Initialize
        function init() {
            // Set default datetime to 5 minutes from now
            const defaultTime = new Date(Date.now() + 5 * 60 * 1000);
            el.dateTimeInput.value = formatDateTimeLocal(defaultTime);
            updateDisplay(5 * 60 * 1000);

            // Event listeners
            el.startBtn.addEventListener('click', startTimer);
            el.pauseBtn.addEventListener('click', pauseTimer);
            el.resetBtn.addEventListener('click', resetTimer);
            el.audioStatus.addEventListener('click', enableAudio);
            el.dismissAlarm.addEventListener('click', dismissAlarm);

            // Preset buttons
            document.querySelectorAll('.preset-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const minutes = parseInt(btn.dataset.min);
                    setDurationFromMinutes(minutes);
                });
            });

            // Input synchronization
            el.dateTimeInput.addEventListener('change', syncFromDateTime);
            [el.daysInput, el.hoursInput, el.minutesInput, el.secondsInput].forEach(input => {
                input.addEventListener('change', syncFromDuration);
            });
        }

        // Audio setup - requires user interaction
        function enableAudio() {
            try {
                if (!timerState.audioContext) {
                    timerState.audioContext = new (window.AudioContext || window.webkitAudioContext)();
                }
                
                if (timerState.audioContext.state === 'suspended') {
                    timerState.audioContext.resume();
                }

                timerState.audioEnabled = true;
                el.audioStatus.classList.add('enabled');
                el.audioStatus.innerHTML = `
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
                    </svg>
                    <span>Audio alarm enabled</span>
                `;
                showToast('Audio enabled successfully', 'success');
            } catch (error) {
                showToast('Failed to enable audio', 'error');
            }
        }

        // Play alarm sound using Web Audio API
        function playAlarmSound() {
            if (!timerState.audioEnabled || !timerState.audioContext) return;

            const ctx = timerState.audioContext;
            const now = ctx.currentTime;

            // Create oscillator for beep
            function playBeep(frequency, start, duration) {
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                
                osc.connect(gain);
                gain.connect(ctx.destination);
                
                osc.type = 'sine';
                osc.frequency.setValueAtTime(frequency, start);
                
                gain.gain.setValueAtTime(0, start);
                gain.gain.linearRampToValueAtTime(0.3, start + 0.05);
                gain.gain.linearRampToValueAtTime(0, start + duration);
                
                osc.start(start);
                osc.stop(start + duration);
            }

            // Create alarm pattern: 3 beeps, pause, 3 beeps...
            for (let i = 0; i < 3; i++) {
                const start = now + i * 0.3;
                playBeep(880, start, 0.2);  // A5
                playBeep(1100, start + 0.1, 0.2); // C#6 - harmonic
            }

            // Repeat after 1 second
            setTimeout(() => {
                if (timerState.isRunning && timerState.remaining <= 0) {
                    playAlarmSound();
                }
            }, 1000);
        }

        // Format datetime for input
        function formatDateTimeLocal(date) {
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            const hour = String(date.getHours()).padStart(2, '0');
            const minute = String(date.getMinutes()).padStart(2, '0');
            return `${year}-${month}-${day}T${hour}:${minute}`;
        }

        // Set duration from preset minutes
        function setDurationFromMinutes(minutes) {
            const now = Date.now();
            const target = now + minutes * 60 * 1000;
            el.dateTimeInput.value = formatDateTimeLocal(new Date(target));
            syncFromDateTime();
            showToast(`Timer set for ${minutes} minute${minutes > 1 ? 's' : ''}`, 'success');
        }

        // Sync duration inputs from datetime
        function syncFromDateTime() {
            const target = new Date(el.dateTimeInput.value).getTime();
            const now = Date.now();
            const diff = Math.max(0, target - now);
            
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((diff % (1000 * 60)) / 1000);

            el.daysInput.value = days;
            el.hoursInput.value = hours;
            el.minutesInput.value = minutes;
            el.secondsInput.value = seconds;

            updateDisplay(diff);
        }

        // Sync datetime from duration inputs
        function syncFromDuration() {
            const days = parseInt(el.daysInput.value) || 0;
            const hours = parseInt(el.hoursInput.value) || 0;
            const minutes = parseInt(el.minutesInput.value) || 0;
            const seconds = parseInt(el.secondsInput.value) || 0;
            
            const totalMs = ((days * 24 * 60 * 60) + (hours * 60 * 60) + (minutes * 60) + seconds) * 1000;
            const target = Date.now() + totalMs;
            
            el.dateTimeInput.value = formatDateTimeLocal(new Date(target));
            updateDisplay(totalMs);
        }

        // Start timer
        function startTimer() {
            if (timerState.isRunning) return;

            // Calculate target time
            const days = parseInt(el.daysInput.value) || 0;
            const hours = parseInt(el.hoursInput.value) || 0;
            const minutes = parseInt(el.minutesInput.value) || 0;
            const seconds = parseInt(el.secondsInput.value) || 0;
            
            const totalMs = ((days * 24 * 60 * 60) + (hours * 60 * 60) + (minutes * 60) + seconds) * 1000;
            
            if (totalMs <= 0) {
                showToast('Please set a duration greater than 0', 'error');
                return;
            }

            if (!timerState.isPaused) {
                timerState.targetTime = Date.now() + totalMs;
                timerState.totalDuration = totalMs;
            }
            
            timerState.isRunning = true;
            timerState.isPaused = false;

            // Update UI
            el.startBtn.disabled = true;
            el.pauseBtn.disabled = false;
            el.statusDot.classList.add('running');
            el.statusDot.classList.remove('paused');
            el.statusText.textContent = 'Running';
            el.endTime.textContent = `Ends at ${new Date(timerState.targetTime).toLocaleTimeString()}`;

            // Disable inputs
            toggleInputs(false);

            // Start interval
            timerState.intervalId = setInterval(tick, 100);
            tick(); // Immediate update
        }

        // Pause timer
        function pauseTimer() {
            if (!timerState.isRunning) return;
            
            timerState.isRunning = false;
            timerState.isPaused = true;
            clearInterval(timerState.intervalId);

            // Calculate new remaining time from now
            timerState.remaining = timerState.targetTime - Date.now();

            // Update UI
            el.startBtn.disabled = false;
            el.pauseBtn.disabled = true;
            el.statusDot.classList.remove('running');
            el.statusDot.classList.add('paused');
            el.statusText.textContent = 'Paused';
        }

        // Reset timer
        function resetTimer() {
            timerState.isRunning = false;
            timerState.isPaused = false;
            timerState.remaining = 0;
            clearInterval(timerState.intervalId);

            // Update UI
            el.startBtn.disabled = false;
            el.pauseBtn.disabled = true;
            el.statusDot.classList.remove('running', 'paused');
            el.statusText.textContent = 'Ready';
            el.endTime.textContent = '';

            // Re-sync display
            syncFromDuration();

            // Enable inputs
            toggleInputs(true);

            // Reset progress ring
            el.progressRing.style.strokeDashoffset = 0;
        }

        // Toggle input enable/disable
        function toggleInputs(enabled) {
            const inputs = [el.dateTimeInput, el.daysInput, el.hoursInput, el.minutesInput, el.secondsInput];
            inputs.forEach(input => input.disabled = !enabled);
        }

        // Timer tick
        function tick() {
            const now = Date.now();
            const remaining = timerState.targetTime - now;

            if (remaining <= 0) {
                timerComplete();
                return;
            }

            timerState.remaining = remaining;
            updateDisplay(remaining);
            updateProgress(remaining);
        }

        // Update display
        function updateDisplay(ms) {
            const days = Math.floor(ms / (1000 * 60 * 60 * 24));
            const hours = Math.floor((ms % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((ms % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((ms % (1000 * 60)) / 1000);

            el.days.textContent = String(days).padStart(2, '0');
            el.hours.textContent = String(hours).padStart(2, '0');
            el.minutes.textContent = String(minutes).padStart(2, '0');
            el.seconds.textContent = String(seconds).padStart(2, '0');
        }

        // Update progress ring
        function updateProgress(remaining) {
            const progress = timerState.totalDuration > 0 ? remaining / timerState.totalDuration : 1;
            const offset = CIRCUMFERENCE * (1 - progress);
            el.progressRing.style.strokeDashoffset = offset;
        }

        // Timer complete
        function timerComplete() {
            timerState.isRunning = false;
            timerState.remaining = 0;
            clearInterval(timerState.intervalId);

            updateDisplay(0);
            el.progressRing.style.strokeDashoffset = CIRCUMFERENCE;

            // Update UI
            el.startBtn.disabled = false;
            el.pauseBtn.disabled = true;
            el.statusDot.classList.remove('running');
            el.statusText.textContent = 'Completed';

            // Enable inputs
            toggleInputs(true);

            // Show alarm
            showAlarm();

            // Play sound
            playAlarmSound();

            // Show notification toast
            showToast('Timer completed!', 'success');
        }

        // Show alarm overlay
        function showAlarm() {
            el.alarmOverlay.classList.add('active');
        }

        // Dismiss alarm
        function dismissAlarm() {
            el.alarmOverlay.classList.remove('active');
            resetTimer();
        }

        // Toast notification
        function showToast(message, type) {
            el.toastIcon.className = 'toast-icon ' + type;
            el.toastIcon.innerHTML = type === 'success' ? '✓' : '✕';
            el.toastMessage.textContent = message;
            el.toast.classList.add('show');

            setTimeout(() => {
                el.toast.classList.remove('show');
            }, 3000);
        }

        // Initialize on load
        init();
    </script>
</body>
</html>
